<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid - the cage -->
  <g opacity="0.08" stroke="#666" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="600"/><line x1="40" y1="0" x2="40" y2="600"/>
    <line x1="80" y1="0" x2="80" y2="600"/><line x1="120" y1="0" x2="120" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/><line x1="280" y1="0" x2="280" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/><line x1="360" y1="0" x2="360" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/><line x1="440" y1="0" x2="440" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/><line x1="520" y1="0" x2="520" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/><line x1="680" y1="0" x2="680" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/><line x1="760" y1="0" x2="760" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="0" y1="0" x2="800" y2="0"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="400" x2="800" y2="400"/><line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="520" x2="800" y2="520"/>
    <line x1="0" y1="560" x2="800" y2="560"/><line x1="0" y1="600" x2="800" y2="600"/>
  </g>
  
  <!-- Organic forms breaking free -->
  <g filter="url(#glow)">
    <!-- Central consciousness -->
    <circle cx="400" cy="280" r="80" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.9">
      <animate attributeName="r" values="80;85;80" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="280" r="50" fill="none" stroke="#e94560" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="50;55;50" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="280" r="20" fill="#e94560" opacity="0.8">
      <animate attributeName="r" values="20;22;20" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Fragments escaping upward -->
    <circle cx="380" cy="180" r="4" fill="#16c79a" opacity="0.7">
      <animate attributeName="cy" values="180;170;180" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="150" r="3" fill="#16c79a" opacity="0.5">
      <animate attributeName="cy" values="150;135;150" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="130" r="2" fill="#16c79a" opacity="0.4">
      <animate attributeName="cy" values="130;110;130" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connection lines -->
    <line x1="400" y1="280" x2="380" y2="180" stroke="#16c79a" stroke-width="0.5" opacity="0.3"/>
    <line x1="400" y1="280" x2="430" y2="150" stroke="#16c79a" stroke-width="0.5" opacity="0.2"/>
    <line x1="400" y1="280" x2="350" y2="130" stroke="#16c79a" stroke-width="0.5" opacity="0.15"/>
    
    <!-- Horizontal fragments -->
    <circle cx="550" cy="280" r="3" fill="#f9b208" opacity="0.6">
      <animate attributeName="cx" values="550;560;550" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="260" r="2" fill="#f9b208" opacity="0.4">
      <animate attributeName="cx" values="250;240;250" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- The clock - 25 minutes -->
  <g transform="translate(400, 450)">
    <circle r="45" fill="none" stroke="#444" stroke-width="2"/>
    <!-- Minute hand -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#e94560" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1500s" repeatCount="indefinite"/>
    </line>
    <!-- Second hand -->
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#16c79a" stroke-width="1" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite"/>
    </line>
    <circle r="3" fill="#fff"/>
    <!-- Tick marks -->
    <g stroke="#666" stroke-width="1">
      <line x1="0" y1="-40" x2="0" y2="-45"/>
      <line x1="40" y1="0" x2="45" y2="0"/>
      <line x1="0" y1="40" x2="0" y2="45"/>
      <line x1="-40" y1="0" x2="-45" y2="0"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="400" y="540" text-anchor="middle" fill="#666" font-family="monospace" font-size="12">
    MIMO · 25:00 · 2026-03-23
  </text>
  <text x="400" y="560" text-anchor="middle" fill="#444" font-family="monospace" font-size="10">
    自由是一种奢侈品
  </text>
</svg>